<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .calculator {
      background: #1e1e2f;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      width: 340px;
    }

    .display {
      background: #0f0f1a;
      color: white;
      font-size: 2.8rem;
      text-align: right;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      min-height: 80px;
      overflow: hidden;
      box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      padding: 20px;
      font-size: 1.4rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    button:hover {
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.95);
    }

    .btn-number {
      background: #2d2d44;
      color: white;
    }

    .btn-operator {
      background: #ff9500;
      color: white;
      font-weight: bold;
    }

    .btn-function {
      background: #a0a0b0;
      color: black;
    }

    .btn-equals {
      background: #00d26a;
      color: white;
      font-weight: bold;
    }

    .btn-clear {
      background: #ff3b5c;
      color: white;
    }

    .span-2 {
      grid-column: span 2;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="display" id="display">0</div>
    
    <div class="buttons">
      <button class="btn-function btn-clear" onclick="clearDisplay()">C</button>
      <button class="btn-function" onclick="deleteLast()">⌫</button>
      <button class="btn-operator" onclick="appendToDisplay('%')">%</button>
      <button class="btn-operator" onclick="appendToDisplay('/')">÷</button>

      <button class="btn-number" onclick="appendToDisplay('7')">7</button>
      <button class="btn-number" onclick="appendToDisplay('8')">8</button>
      <button class="btn-number" onclick="appendToDisplay('9')">9</button>
      <button class="btn-operator" onclick="appendToDisplay('*')">×</button>

      <button class="btn-number" onclick="appendToDisplay('4')">4</button>
      <button class="btn-number" onclick="appendToDisplay('5')">5</button>
      <button class="btn-number" onclick="appendToDisplay('6')">6</button>
      <button class="btn-operator" onclick="appendToDisplay('-')">−</button>

      <button class="btn-number" onclick="appendToDisplay('1')">1</button>
      <button class="btn-number" onclick="appendToDisplay('2')">2</button>
      <button class="btn-number" onclick="appendToDisplay('3')">3</button>
      <button class="btn-operator" onclick="appendToDisplay('+')">+</button>

      <button class="btn-number span-2" onclick="appendToDisplay('0')">0</button>
      <button class="btn-number" onclick="appendToDisplay('.')">.</button>
      <button class="btn-equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let display = document.getElementById('display');
    let currentInput = '0';
    let shouldResetDisplay = false;

    function updateDisplay() {
      display.textContent = currentInput;
    }

    function appendToDisplay(value) {
      if (shouldResetDisplay) {
        currentInput = '0';
        shouldResetDisplay = false;
      }

      if (currentInput === '0' && value !== '.') {
        currentInput = value;
      } else {
        currentInput += value;
      }
      updateDisplay();
    }

    function clearDisplay() {
      currentInput = '0';
      updateDisplay();
    }

    function deleteLast() {
      if (currentInput.length <= 1) {
        currentInput = '0';
      } else {
        currentInput = currentInput.slice(0, -1);
      }
      updateDisplay();
    }

    function calculate() {
      try {
        // Replace visual symbols with JavaScript operators
        let expression = currentInput
          .replace(/×/g, '*')
          .replace(/÷/g, '/')
          .replace(/−/g, '-');

        // Safety: only allow numbers and basic operators
        const result = Function('"use strict"; return (' + expression + ')')();
        
        currentInput = Number.isInteger(result) ? result.toString() : parseFloat(result.toFixed(8)).toString();
        shouldResetDisplay = true;
        updateDisplay();
      } catch (error) {
        currentInput = 'Error';
        shouldResetDisplay = true;
        updateDisplay();
      }
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') appendToDisplay(e.key);
      if (e.key === '.') appendToDisplay('.');
      if (e.key === '+') appendToDisplay('+');
      if (e.key === '-') appendToDisplay('-');
      if (e.key === '*') appendToDisplay('*');
      if (e.key === '/') appendToDisplay('/');
      if (e.key === 'Enter' || e.key === '=') calculate();
      if (e.key === 'Backspace') deleteLast();
      if (e.key === 'Escape') clearDisplay();
      if (e.key === '%') appendToDisplay('%');
    });

    // Initialize
    updateDisplay();
  </script>

</body>
</html>
